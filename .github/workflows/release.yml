name: release

# Пуш тега v* -> автосборка standalone-exe и публикация в Releases
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ffmpeg (gyan.dev essentials, GPL)
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffx
          Copy-Item (Get-ChildItem ffx -Recurse -Filter ffmpeg.exe | Select-Object -First 1).FullName .\ffmpeg.exe

      - name: Pack ffmpeg resource
        run: powershell -NoProfile -ExecutionPolicy Bypass -File src/make-ffmpeg-gz.ps1

      - name: Build standalone
        shell: cmd
        run: cd src && build-standalone.cmd

      - name: Package zip
        run: Compress-Archive -Path StickerStudio-Standalone.exe, README.txt -DestinationPath StickerStudio-Standalone.zip

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            # релиз уже есть (перенос тега) — просто обновляем файлы
            gh release upload $tag StickerStudio-Standalone.exe StickerStudio-Standalone.zip --clobber
          } else {
            gh release create $tag StickerStudio-Standalone.exe StickerStudio-Standalone.zip --title "Sticker Studio $tag" --notes "Один файл, внутри уже есть ffmpeg — скачал и работаешь. Windows 10/11, установка не нужна. Если SmartScreen предупреждает: Подробнее -> Выполнить в любом случае."
          }
